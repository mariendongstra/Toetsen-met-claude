<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studiequest</title>
<style>
  :root{
    --bg:#0F1226; --bg2:#161A36; --paper:#1C2143; --paper2:#232A52;
    --ink:#F2F4FF; --muted:#9AA3CC; --faint:#6B73A0;
    --line:#2C3360; --line-strong:#3A4480;
    --primary:#6C7BFF; --primary-ink:#0F1226; --primary-soft:#262E5E;
    --gold:#FFC24B; --gold-soft:#3A3320;
    --weak:#FF6B6B; --weak-soft:#3A2030;
    --mid:#FFB44C; --mid-soft:#3A3020;
    --strong:#4BE0A8; --strong-soft:#163A30;
    --none:#5B6396; --none-soft:#222A52;
    --r:16px; --r-sm:10px;
    --shadow:0 2px 4px rgba(0,0,0,.2),0 18px 40px -18px rgba(0,0,0,.6);
    --display:ui-serif,Georgia,Cambria,'Times New Roman',serif;
    --body:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--body);
    background:radial-gradient(1200px 600px at 80% -10%,#1E2552 0,transparent 60%),
               radial-gradient(900px 500px at 0% 0%,#1A2148 0,transparent 55%),var(--bg);
    background-attachment:fixed;color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;font-size:15px;min-height:100vh}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:15px}
  @media (prefers-reduced-motion:no-preference){
    .anim{animation:rise .42s cubic-bezier(.2,.8,.3,1) both}
    @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .pop{animation:pop .3s cubic-bezier(.2,1.4,.4,1) both}
    @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
  }
  .wrap{max-width:1000px;margin:0 auto;padding:0 20px 90px}

  /* Top bar */
  .top{position:sticky;top:0;z-index:30;background:rgba(15,18,38,.72);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .top-in{max-width:1000px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:9px;margin-right:auto}
  .brand b{font-family:var(--display);font-weight:600;font-size:20px;letter-spacing:-.01em}
  .brand .crest{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--primary),#9B6CFF);
    display:grid;place-items:center;font-size:15px}
  /* Level chip in header */
  .lvlchip{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);
    border-radius:12px;padding:6px 12px}
  .lvlchip .lv{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--gold)}
  .lvlchip .xpbar{width:96px;height:7px;border-radius:5px;background:var(--bg2);overflow:hidden}
  .lvlchip .xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#9B6CFF);transition:width .6s cubic-bezier(.2,.8,.3,1)}
  .lvlchip .rank{font-size:12.5px;font-weight:600;color:var(--muted)}
  .lvlchip .who{font-size:12.5px;font-weight:700;color:var(--ink);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:4px 9px}
  .lvlchip .who:hover{border-color:var(--primary)}
  .nav{display:flex;gap:3px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:4px}
  .nav button{padding:7px 12px;border-radius:9px;font-weight:600;font-size:13px;color:var(--muted)}
  .nav button.on{background:var(--primary);color:var(--primary-ink)}
  .ghost{padding:8px 12px;border-radius:10px;font-weight:600;font-size:13px;border:1px solid var(--line-strong);background:var(--paper);color:var(--ink)}
  .ghost:hover{border-color:var(--primary)}

  .h-eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);font-weight:700;margin:0 0 7px}
  .h1{font-family:var(--display);font-weight:600;font-size:36px;line-height:1.06;letter-spacing:-.02em;margin:0 0 10px}
  .lead{color:var(--muted);max-width:60ch;margin:0 0 26px}
  .section-top{margin:40px 0 16px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .section-top h2{font-family:var(--display);font-weight:600;font-size:23px;margin:0;letter-spacing:-.01em}

  .notice{display:flex;gap:10px;align-items:center;background:var(--primary-soft);border:1px solid var(--line-strong);
    color:#C6CCFF;border-radius:12px;padding:11px 14px;font-size:13.5px;margin:18px 0 0}
  .notice svg{flex:none}

  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
  .card.click{cursor:pointer;transition:transform .14s,border-color .14s}
  .card.click:hover{transform:translateY(-3px);border-color:var(--line-strong)}
  .subj-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
  .subj-name{font-family:var(--display);font-size:20px;font-weight:600;letter-spacing:-.01em}
  .subj-meta{font-size:12.5px;color:var(--muted)}
  .pill{font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;white-space:nowrap}
  .pill.strong{background:var(--strong-soft);color:var(--strong)}
  .pill.mid{background:var(--mid-soft);color:var(--mid)}
  .pill.weak{background:var(--weak-soft);color:var(--weak)}
  .pill.none{background:var(--none-soft);color:var(--muted)}

  .topic{margin-top:14px}
  .topic-row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13.5px;margin-bottom:5px}
  .topic-row .t-name{font-weight:500}
  .topic-row .t-stat{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .bar{height:8px;border-radius:5px;background:var(--bg2);overflow:hidden}
  .bar i{display:block;height:100%;border-radius:5px;transition:width .6s cubic-bezier(.2,.8,.3,1)}
  .bar i.strong{background:var(--strong)} .bar i.mid{background:var(--mid)}
  .bar i.weak{background:var(--weak)} .bar i.none{background:var(--none)}

  .empty{text-align:center;padding:54px 20px;border:1.5px dashed var(--line-strong);border-radius:var(--r);color:var(--muted);background:var(--paper)}
  .empty h3{font-family:var(--display);color:var(--ink);font-size:20px;margin:0 0 6px}

  .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:12px;font-weight:700;font-size:14.5px;
    background:var(--primary);color:var(--primary-ink);transition:filter .14s,transform .06s}
  .btn:hover{filter:brightness(1.08)} .btn:active{transform:scale(.985)}
  .btn.big{padding:15px 26px;font-size:16px}
  .btn-line{background:transparent;color:var(--ink);border:1px solid var(--line-strong);font-weight:600}
  .btn-line:hover{border-color:var(--primary);filter:none}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  label.fld{display:block;margin-bottom:14px}
  label.fld>span{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  .inp{width:100%;padding:10px 12px;border:1px solid var(--line-strong);border-radius:var(--r-sm);background:var(--bg2);color:var(--ink)}
  .inp:focus{outline:2px solid var(--primary);outline-offset:1px;border-color:var(--primary)}
  textarea.inp{min-height:80px;resize:vertical;line-height:1.45}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>*{flex:1;min-width:140px}
  .checks{display:flex;flex-wrap:wrap;gap:8px}
  .chk{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border:1px solid var(--line-strong);border-radius:20px;
    font-size:13.5px;font-weight:500;cursor:pointer;user-select:none;background:var(--bg2)}
  .chk.on{background:var(--primary);color:var(--primary-ink);border-color:var(--primary)}

  /* Quiz */
  .quiz-bar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:6px}
  .quiz-stats{display:flex;gap:8px;align-items:center}
  .timer,.xpnow,.combo{font-family:var(--mono);font-weight:700;font-size:14px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:6px 11px}
  .xpnow{color:var(--primary)}
  .combo{color:var(--gold);border-color:var(--gold-soft);background:var(--gold-soft);display:none}
  .combo.show{display:inline-block}
  .prog{height:7px;border-radius:5px;background:var(--bg2);overflow:hidden;margin:14px 0 26px}
  .prog i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#9B6CFF);transition:width .35s}
  .q-topic{font-family:var(--mono);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);font-weight:700}
  .q-text{font-family:var(--display);font-size:27px;font-weight:500;line-height:1.24;letter-spacing:-.01em;margin:8px 0 22px}
  .opt{display:block;width:100%;text-align:left;padding:15px 17px;border:1.5px solid var(--line-strong);border-radius:var(--r);
    background:var(--paper);margin-bottom:11px;font-size:15.5px;font-weight:500;transition:border-color .12s,background .12s,transform .08s}
  .opt:hover{border-color:var(--primary)} .opt:active{transform:scale(.995)}
  .opt.sel{border-color:var(--primary);background:var(--primary-soft)}
  .opt.correct{border-color:var(--strong);background:var(--strong-soft);color:#9BF0CE}
  .opt.wrong{border-color:var(--weak);background:var(--weak-soft);color:#FFC0C0}
  .opt .mark{float:right;font-weight:700}
  .flash{border:1.5px solid var(--line-strong);border-radius:var(--r);padding:22px;background:var(--paper);margin-bottom:18px;min-height:90px}
  .flash .ans{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);font-size:16px;color:#9BF0CE}
  .expl{font-size:13.5px;color:var(--muted);background:var(--bg2);border-radius:10px;padding:11px 13px;margin-top:14px;border:1px solid var(--line)}
  .feedback{font-weight:700;margin:4px 0 12px;min-height:22px}
  .feedback.ok{color:var(--strong)} .feedback.no{color:var(--weak)}

  /* XP pop */
  .xppop{position:fixed;z-index:80;font-family:var(--mono);font-weight:700;font-size:22px;color:var(--gold);
    pointer-events:none;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  @keyframes float-up{0%{opacity:0;transform:translateY(8px) scale(.8)}15%{opacity:1;transform:translateY(0) scale(1.1)}100%{opacity:0;transform:translateY(-46px) scale(1)}}

  /* Results */
  .score-hero{text-align:center;padding:14px 0 8px;position:relative}
  .ring{width:150px;height:150px;margin:0 auto 8px;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .ctr{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .ring .pctnum{font-family:var(--display);font-size:40px;font-weight:600;line-height:1}
  .ring .pctsub{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:.08em}
  .score-line{font-family:var(--display);font-size:24px;font-weight:600;margin-top:4px}
  .score-sub{color:var(--muted);margin-top:4px}
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:8px 0 4px}
  .stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px;text-align:center}
  .stat .v{font-family:var(--mono);font-size:21px;font-weight:700}
  .stat .k{font-size:12px;color:var(--muted);margin-top:3px}
  .xpgain{background:linear-gradient(135deg,var(--primary-soft),var(--paper));border:1px solid var(--line-strong);
    border-radius:var(--r);padding:18px;margin:16px 0;text-align:center}
  .xpgain .big{font-family:var(--display);font-size:30px;font-weight:600;color:var(--gold)}
  .xpgain .lvbar{height:10px;border-radius:6px;background:var(--bg2);overflow:hidden;margin:12px 0 6px}
  .xpgain .lvbar i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#9B6CFF);transition:width 1s cubic-bezier(.2,.8,.3,1)}
  .levelup{display:inline-block;background:var(--gold);color:#221A00;font-weight:800;font-size:13px;padding:5px 12px;border-radius:20px;margin-bottom:8px}
  .review{margin-top:8px}
  .rev-item{display:flex;gap:11px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
  .rev-dot{width:22px;height:22px;border-radius:7px;flex:none;display:grid;place-items:center;color:#0F1226;font-weight:800;font-size:13px;margin-top:1px}
  .rev-dot.ok{background:var(--strong)} .rev-dot.no{background:var(--weak)}
  .rev-q{font-weight:500} .rev-meta{font-size:12.5px;color:var(--muted);margin-top:2px}

  /* Badges */
  .badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .badge{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px;text-align:center;opacity:.4;filter:grayscale(.6)}
  .badge.on{opacity:1;filter:none;border-color:var(--line-strong)}
  .badge .ic{font-size:30px;line-height:1}
  .badge .bn{font-weight:700;font-size:13.5px;margin-top:8px}
  .badge .bd{font-size:11.5px;color:var(--muted);margin-top:3px}
  .badge.fresh{box-shadow:0 0 0 2px var(--gold)}

  /* History */
  .hist{display:flex;flex-direction:column;gap:10px}
  .hrow{display:flex;align-items:center;gap:14px;background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
  .hscore{font-family:var(--display);font-size:24px;font-weight:600;width:60px;flex:none}
  .hbody{flex:1;min-width:0} .hbody .hn{font-weight:600} .hbody .hm{font-size:12.5px;color:var(--muted);margin-top:2px}
  .htime{font-family:var(--mono);font-size:13px;color:var(--muted);text-align:right;white-space:nowrap}

  /* Manage */
  .q-item{padding:13px 0;border-bottom:1px solid var(--line)}
  .mh{font-family:var(--display);font-size:18px;margin:0 0 14px;font-weight:600}
  .q-item .qq{font-weight:500} .q-item .qmeta{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .tag{font-family:var(--mono);font-size:10.5px;font-weight:700;background:var(--bg2);color:var(--muted);padding:3px 7px;border-radius:6px}
  .lnk{color:var(--weak);font-weight:600;font-size:12.5px}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(8,10,24,.66);backdrop-filter:blur(4px);z-index:60;display:grid;place-items:center;padding:20px}
  .modal{background:var(--paper);border:1px solid var(--line-strong);border-radius:18px;max-width:560px;width:100%;max-height:85vh;overflow:auto;box-shadow:0 40px 90px -20px rgba(0,0,0,.7)}
  .modal-in{padding:24px}
  .modal h3{font-family:var(--display);font-size:22px;margin:0 0 4px;font-weight:600}
  .x{position:absolute;top:16px;right:18px;font-size:22px;color:var(--muted);line-height:1}
  .pos{position:relative}

  .loading{display:grid;place-items:center;min-height:60vh;color:var(--muted);gap:14px;text-align:center}
  .spin{width:30px;height:30px;border:3px solid var(--line-strong);border-top-color:var(--primary);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  #confetti{position:fixed;inset:0;pointer-events:none;z-index:55}

  @media(max-width:600px){
    .h1{font-size:28px}.q-text{font-size:22px}
    .stat-row{grid-template-columns:1fr 1fr}
    .nav{order:3;width:100%;justify-content:space-between}
    .lvlchip .xpbar{width:70px}
  }
</style>
</head>
<body>
<header class="top">
  <div class="top-in">
    <div class="brand"><span class="crest">⚔️</span><b>Studiequest</b></div>
    <div class="lvlchip" id="lvlchip"></div>
    <nav class="nav" id="nav"></nav>
    <button class="ghost" id="dataBtn" data-action="open-data" style="display:none">Data</button>
  </div>
</header>
<canvas id="confetti"></canvas>
<main class="wrap" id="root"><div class="loading"><div class="spin"></div><div>Laden…</div></div></main>
<div id="modal"></div>

<script>
/* ===================== Opslag (Claude-gedeeld → localStorage → geheugen) ===================== */
const KEYS={content:'quest:content:v1', attempts:'quest:attempts:v1', profile:'quest:profile:v1'};
const mem={};
const hasStore=typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function';
const LS=(()=>{ try{const t='__qt__';localStorage.setItem(t,'1');localStorage.removeItem(t);return true;}catch(e){return false;} })();
function withTimeout(p,ms){ return Promise.race([p, new Promise(res=>setTimeout(()=>res('__timeout__'),ms))]); }
function parseMaybe(raw){ if(raw==null)return null; if(typeof raw!=='string')return raw; try{return JSON.parse(raw);}catch(e){return raw;} }
async function sget(k,shared=true){
  if(hasStore){ try{const r=await withTimeout(window.storage.get(k,shared),4000); if(r==='__timeout__')return null; return parseMaybe(r?r.value:null);}catch(e){return null;} }
  if(LS){ try{return parseMaybe(localStorage.getItem(k));}catch(e){return null;} }
  return parseMaybe(k in mem?mem[k]:null);
}
async function sset(k,v,shared=true){
  const s=JSON.stringify(v);
  if(hasStore){ try{const r=await withTimeout(window.storage.set(k,s,shared),4000); return r!=='__timeout__'&&!!r;}catch(e){console.error(e);return false;} }
  if(LS){ try{localStorage.setItem(k,s);return true;}catch(e){return false;} }
  mem[k]=s; return true;
}
// Opslaglocatie voor de gebruiker leesbaar
function storageLabel(){ return hasStore?'Claude (gedeeld, blijft bewaard)':LS?'deze browser (localStorage)':'tijdelijk geheugen (gaat verloren bij verversen)'; }

/* ===================== Voorgeladen data ===================== */
const DEFAULT_LEVELS=['Basisschool groep 6','Basisschool groep 7','Basisschool groep 8','VWO gymnasium klas 1','VWO gymnasium klas 2'];
function seedContent(){
  const S='gs', T1='§6.1 De Renaissance', T2='§6.2 Het humanisme', T3='§6.3 De ontdekkingsreizen', T4='§6.4 Einde Amerikaanse culturen';
  const Q=(o)=>Object.assign({id:'s'+(Q._n=(Q._n||0)+1), subjectId:S},o);
  // Eenvoudige schematische voorbeeldkaart (stip op een landvorm); 'with' toont de plaatsnaam erbij.
  const land="<path d='M120 20 C170 20 210 55 205 110 C200 165 175 215 130 220 C95 224 70 195 72 150 C74 110 60 85 80 55 C92 36 100 20 120 20 Z' fill='#D7DEE8' stroke='#8B97AC' stroke-width='2'/>";
  const mapSVG=(x,y,label)=>`<svg xmlns='http://www.w3.org/2000/svg' width='280' height='240' viewBox='0 0 280 240'><rect width='280' height='240' fill='#AEC9E6'/>${land}<circle cx='${x}' cy='${y}' r='7' fill='#E0483F' stroke='#fff' stroke-width='2'/>${label?`<line x1='${x}' y1='${y}' x2='${x+30}' y2='${y-26}' stroke='#324' stroke-width='1.5'/><rect x='${x+30}' y='${y-44}' width='120' height='22' rx='5' fill='#fff' stroke='#324'/><text x='${x+38}' y='${y-29}' font-family='sans-serif' font-size='13' font-weight='700' fill='#1A1A2E'>${label}</text>`:''}</svg>`;
  const du=svg=>'data:image/svg+xml,'+encodeURIComponent(svg);
  const M=(o)=>Object.assign({id:'m'+(M._n=(M._n||0)+1), subjectId:'topo', type:'map'},o);
  return {
    levels:[...DEFAULT_LEVELS],
    adminCode:'1234',
    students:[],
    subjects:[
      {id:S, name:'Geschiedenis', emoji:'🏛️', sub:'Memo 1B · H6 — Nieuwe ideeën, nieuwe werelden', level:'VWO gymnasium klas 1'},
      {id:'topo', name:'Topografie Nederland', emoji:'🗺️', sub:'Aardrijkskunde · plaatsen & provincies', level:'Basisschool groep 7'},
    ],
    questions:[
      // ---- §6.1 Renaissance ----
      Q({topic:T1,type:'mc',question:"Wat betekent het woord 'renaissance' letterlijk?",
        options:['Wedergeboorte','Verlichting','Vooruitgang','Hervorming'],answer:0,
        explanation:'Renaissance betekent "wedergeboorte": de herontdekking van de klassieke cultuur van Grieken en Romeinen.'}),
      Q({topic:T1,type:'mc',question:'In welk gebied begon de renaissance?',
        options:['De Italiaanse steden','Engeland','De Duitse landen','Spanje'],answer:0,
        explanation:'De renaissance begon in rijke Italiaanse handelssteden zoals Florence, waar veel Romeinse overblijfselen lagen.'}),
      Q({topic:T1,type:'mc',question:'Welke techniek zorgde ervoor dat schilders diepte (ruimte) in een schilderij konden weergeven?',
        options:['Perspectief','Goudgrond','Symboliek','Verkorting'],answer:0,
        explanation:'Met perspectief lijken voorwerpen verder weg kleiner: het schilderij krijgt diepte en wordt realistisch.'}),
      Q({topic:T1,type:'mc',question:'Rijke families zoals de Medici betaalden kunstenaars om kunst te maken. Hoe noem je zo’n beschermheer/geldschieter van kunst?',
        options:['Mecenas','Gilde','Vazal','Schepen'],answer:0,

/* ===================== State ===================== */
let content=null, attempts=[], profile=null, state={view:'login', quiz:null, mode:null}, timerInt=null;

function migrate(c){
  if(!c.levels) c.levels=[...DEFAULT_LEVELS];
  if(!c.students) c.students=[];
  if(!c.adminCode) c.adminCode='1234';
  (c.subjects||[]).forEach(s=>{ if(!s.level) s.level=c.levels[0]||'Onbekend'; });
  return c;
}
async function init(){
  try{
    let c=await sget(KEYS.content);
    if(!c){ c=seedContent(); }
    content=migrate(c); await sset(KEYS.content,content);
    attempts=(await sget(KEYS.attempts))||[];
    profile=await sget(KEYS.profile,false); // onthoudt op dit apparaat wie ingelogd is
  }catch(e){ console.error('init',e); if(!content) content=migrate(seedContent()); attempts=attempts||[]; }
  if(profile&&profile.studentId&&currentStudent()){ state.mode='student'; state.view='dashboard'; }
  else { state.mode=null; state.view='login'; }
  render();
}
function currentStudent(){ return profile&&profile.studentId?content.students.find(s=>s.id===profile.studentId):null; }
async function loginStudent(id){ profile={studentId:id}; await sset(KEYS.profile,profile,false); state.mode='student'; }
async function logout(){ profile=null; await sset(KEYS.profile,null,false); state.mode=null; state.view='login'; state.admin=false; }
// Sessies van de huidige leerling (op id, dus stabiel als naam/niveau verandert)
function myAttempts(){ const s=currentStudent(); return s?attempts.filter(a=>a.studentId===s.id):[]; }
// Vakken die bij het niveau van de huidige leerling horen
function mySubjects(){ const s=currentStudent(); return s?content.subjects.filter(x=>x.level===s.level):content.subjects; }

/* ===================== Gamification ===================== */
// Niveaus: cumulatieve XP-drempels
const LEVELS=[0,80,200,380,620,940,1340,1820,2400,3100,3900,4800,5800];
const RANKS=['Leerling','Leerling','Pupil','Pupil','Kenner','Kenner','Gezel','Gezel','Meester','Meester','Grootmeester'];
function totalXP(){ return myAttempts().reduce((s,a)=>s+(a.xp||0),0); }
function levelInfo(){
  const xp=totalXP(); let lvl=1;
  for(let i=0;i<LEVELS.length;i++){ if(xp>=LEVELS[i]) lvl=i+1; }
  const cur=LEVELS[lvl-1]||0;
  const next=LEVELS[lvl]!==undefined?LEVELS[lvl]:cur;
  const span=next-cur||1;
  const into=xp-cur;
  return {xp, lvl, into, span, pct:Math.min(100,Math.round(into/span*100)), max:lvl>=LEVELS.length,
          rank:RANKS[Math.min(lvl-1,RANKS.length-1)], next};
}
// Badges, berekend uit de geschiedenis van de huidige leerling
function masteredTopicExists(){
  for(const s of content.subjects) for(const t of topicsOf(s.id)){ if(masteryFor(s.id,t).level==='strong') return true; }
  return false;
}
function badgeDefs(){
  const A=myAttempts();
  const done=A.length;
  const best=A.reduce((m,a)=>Math.max(m,a.total?a.correct/a.total:0),0);
  const maxStreak=A.reduce((m,a)=>Math.max(m,a.maxStreak||0),0);
  const fast=A.some(a=>a.total>=4 && a.correct/a.total>=0.8 && a.durationSec/a.total<10);
  return [
    {id:'first', ic:'🚀', name:'Eerste expeditie', desc:'Rond je eerste sessie af', on:done>=1},
    {id:'flawless', ic:'💯', name:'Vlekkeloos', desc:'100% goed in één sessie', on:best>=1},
    {id:'streak', ic:'🔥', name:'Op dreef', desc:'5 goede antwoorden op rij', on:maxStreak>=5},
    {id:'fast', ic:'⚡', name:'Sneldenker', desc:'Snel én ≥80% goed', on:fast},
    {id:'persist', ic:'📚', name:'Volhouder', desc:'10 sessies afgerond', on:done>=10},
    {id:'master', ic:'🧠', name:'Kennisbaas', desc:'Een onderwerp op "solide"', on:masteredTopicExists()},
  ];
}

/* ===================== Mastery (per leerling) ===================== */
const RECENT=8;
function topicOutcomes(sid,topic){ const out=[];
  [...myAttempts()].sort((a,b)=>a.finishedAt-b.finishedAt).forEach(a=>{ if(a.subjectId!==sid)return;
    a.results.forEach(r=>{ if(r.topic===topic) out.push(r.correct); }); });
  return out; }
function masteryFor(sid,topic){ const o=topicOutcomes(sid,topic).slice(-RECENT);
  if(!o.length) return {level:'none',pct:0,n:0,label:'nog niet getoetst'};
  const pct=Math.round(o.filter(Boolean).length/o.length*100);
  return {level:pct>=80?'strong':pct>=50?'mid':'weak',pct,n:o.length,label:pct+'% goed'}; }
function topicsOf(sid){ const set=new Set(); content.questions.forEach(q=>{if(q.subjectId===sid)set.add(q.topic);}); return [...set]; }
function subjectMastery(sid){ const ts=topicsOf(sid).map(t=>masteryFor(sid,t)).filter(m=>m.n>0);
  if(!ts.length) return {level:'none',pct:0};
  const pct=Math.round(ts.reduce((s,m)=>s+m.pct,0)/ts.length);
  return {level:pct>=80?'strong':pct>=50?'mid':'weak',pct}; }

/* ===================== Helpers ===================== */
function fmtDur(s){const m=Math.floor(s/60),x=s%60;return m>0?m+'m '+String(x).padStart(2,'0')+'s':x+'s';}
function fmtDate(ts){const d=new Date(ts);return d.toLocaleDateString('nl-NL',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function subj(id){return content.subjects.find(x=>x.id===id);}
function subjName(id){const s=subj(id);return s?s.name:'?';}
// Verklein een geüploade afbeelding naar een compacte JPEG-dataURL (opslagvriendelijk)
function scaleImage(file,maxDim,quality){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>{ const img=new Image();
      img.onload=()=>{ let{width:w,height:h}=img; const sc=Math.min(1,maxDim/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        try{ resolve(cv.toDataURL('image/jpeg',quality)); }catch(e){ resolve(fr.result); } };
      img.onerror=reject; img.src=fr.result; };
    fr.onerror=reject; fr.readAsDataURL(file);
  });
}

/* ===================== Render ===================== */
function render(){
  renderChip(); renderNav();
  const root=document.getElementById('root');
  const v=state.view;
  let html=v==='login'?viewLogin():v==='dashboard'?viewDashboard():v==='setup'?viewSetup():v==='quiz'?viewQuiz():
           v==='results'?viewResults():v==='badges'?viewBadges():v==='history'?viewHistory():v==='report'?viewReport():v==='manage'?viewManage():'';
  root.innerHTML='<div class="anim">'+html+'</div>';
  if(v==='quiz'){ state.quiz.qShownAt=Date.now(); startTimerDisplay(); const ta=document.getElementById('typed'); if(ta) ta.focus(); }
  if(v==='results') drawRing();
}
function renderChip(){
  const chip=document.getElementById('lvlchip'), navEl=document.getElementById('nav'), dataBtn=document.getElementById('dataBtn');
  if(dataBtn) dataBtn.style.display=state.mode==='admin'?'inline-flex':'none';
  if(state.view==='login'||!state.mode){ chip.innerHTML=''; navEl.style.visibility='hidden'; return; }
  navEl.style.visibility='visible';
  if(state.mode==='admin'){ chip.innerHTML=`<button class="who" data-action="logout" title="Uitloggen">🔧 Docent · uitloggen</button>`; return; }
  const st=currentStudent(), L=levelInfo();
  chip.innerHTML=`<button class="who" data-action="logout" title="Wissel leerling">👤 ${esc(st?st.name:'')} · ${esc(st?st.level:'')}</button>
    <span class="lv">LV ${L.lvl}</span><div class="xpbar"><i style="width:${L.max?100:L.pct}%"></i></div><span class="rank">${L.rank}</span>`;
}
function renderNav(){
  const navEl=document.getElementById('nav'); const cur=state.view;
  if(!state.mode){ navEl.innerHTML=''; return; }
  const tabs = state.mode==='admin'
    ? [['manage','Beheer'],['report','Resultaten']]
    : [['dashboard','Overzicht'],['setup','Oefenen'],['badges','Badges'],['history','Sessies']];
  navEl.innerHTML=tabs.map(([k,l])=>
    `<button data-nav="${k}" class="${cur===k||(k==='setup'&&['quiz','results'].includes(cur))?'on':''}">${l}</button>`).join('');
}

function viewDashboard(){
  const L=levelInfo();
  const st=currentStudent();
  const subs=mySubjects();
  if(subs.length===0)
    return `<p class="h-eyebrow">${esc(st?st.level:'')}</p><h1 class="h1">Nog geen toetsen voor jouw niveau</h1>
      <div class="empty"><h3>Tot zo!</h3><p>Er staan nog geen toetsen klaar voor ${esc(st?st.level:'jouw niveau')}. Je docent zet ze klaar via Beheer.</p></div>`;
  const totalA=myAttempts().length, totalT=myAttempts().reduce((s,a)=>s+a.durationSec,0);
  const earned=badgeDefs().filter(b=>b.on).length;
  const weak=[];
  subs.forEach(s=>topicsOf(s.id).forEach(t=>{const m=masteryFor(s.id,t);
    if(m.level==='weak'||m.level==='mid') weak.push({s:s.name,sid:s.id,t,m});}));
  weak.sort((a,b)=>a.m.pct-b.m.pct);

  const cards=subs.map(s=>{
    const sm=subjectMastery(s.id), ts=topicsOf(s.id);
    const rows=ts.map(t=>{const m=masteryFor(s.id,t);
      return `<div class="topic-row"><span class="t-name">${esc(t)}</span><span class="t-stat">${m.label}</span></div>
        <div class="bar"><i class="${m.level}" style="width:${m.level==='none'?5:m.pct}%"></i></div>`;}).join('')
      ||`<div class="subj-meta" style="margin-top:8px">Nog geen onderwerpen.</div>`;
    return `<div class="card click" data-start-subject="${s.id}">
      <div class="subj-head"><span class="subj-name">${s.emoji?esc(s.emoji)+' ':''}${esc(s.name)}</span>
        <span class="pill ${sm.level}">${sm.level==='none'?'nieuw':sm.pct+'%'}</span></div>
      <div class="subj-meta">${esc(s.sub||(ts.length+' onderwerpen'))}</div>
      <div class="topic">${rows}</div></div>`;}).join('');

  let weakHtml='';
  if(weak.length) weakHtml=`<div class="section-top"><h2>Hier ligt de uitdaging</h2></div><div class="grid">`+
    weak.slice(0,6).map(w=>`<div class="card click" data-start-topic="${w.sid}|${esc(w.t)}">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
        <div><div class="subj-meta">${esc(w.s)}</div><div class="subj-name" style="font-size:16px">${esc(w.t)}</div></div>
        <span class="pill ${w.m.level}">${w.m.pct}%</span></div>
      <div class="bar" style="margin-top:12px"><i class="${w.m.level}" style="width:${w.m.pct}%"></i></div></div>`).join('')+`</div>`;

  return `<p class="h-eyebrow">${esc(st?st.name:'')} · ${esc(st?st.level:'')}</p>
    <h1 class="h1">Klaar voor de<br>volgende quest?</h1>
    <p class="lead">Maak vragen goed om XP te verdienen, bouw combo’s op voor bonuspunten en stijg in level. Tegelijk zie je per onderwerp hoe sterk je kennis is — zodat je gericht oefent waar het nog spannend is.</p>
    <div class="xpgain" style="text-align:left;display:flex;align-items:center;gap:18px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <div style="font-weight:700">Level ${L.lvl} — ${esc(L.rank)}</div>
        <div class="lvbar" style="margin:10px 0 6px"><i style="width:${L.max?100:L.pct}%"></i></div>
        <div class="subj-meta">${L.max?'Maximumniveau bereikt — respect!':`${L.xp} XP · nog ${L.next-L.xp} XP tot level ${L.lvl+1}`}</div>
      </div>
      <div style="text-align:center"><div class="big" style="font-size:26px">${earned}/${badgeDefs().length}</div><div class="subj-meta">badges</div></div>
    </div>
    <div class="stat-row" style="max-width:520px">
      <div class="stat"><div class="v">${totalA}</div><div class="k">sessies</div></div>
      <div class="stat"><div class="v">${fmtDur(totalT)}</div><div class="k">totale tijd</div></div>
      <div class="stat"><div class="v">${totalXP()}</div><div class="k">XP totaal</div></div></div>

    <div class="grid">${cards}</div>${weakHtml}`;
}

function viewSetup(){

  if(subs.length===0) return `<h1 class="h1">Geen toetsen voor jouw niveau</h1><div class="empty"><p>Je docent zet ze klaar via Beheer.</p></div>`;
  if(!state.setup||!subs.find(s=>s.id===state.setup.subjectId)) state.setup={subjectId:subs[0].id,topics:null,count:10};
  const sid=state.setup.subjectId, ts=topicsOf(sid);
  if(state.setup.topics===null) state.setup.topics=[...ts];
  const sOpts=subs.map(s=>`<option value="${s.id}" ${s.id===sid?'selected':''}>${esc(s.name)}</option>`).join('');
  const tChecks=ts.map(t=>`<button class="chk ${state.setup.topics.includes(t)?'on':''}" data-toggle-topic="${esc(t)}">${esc(t)}</button>`).join('')
    ||`<span class="subj-meta">Dit vak heeft nog geen onderwerpen.</span>`;

      <label class="fld"><span>Onderwerpen (tik om aan/uit te zetten)</span></label>
      <div class="checks" style="margin-bottom:18px">${tChecks}</div>
      <label class="fld"><span>Aantal vragen — <b id="cnt">${cnt}</b> van ${pool} beschikbaar</span>
        <input class="inp" type="range" min="1" max="${Math.max(maxN,1)}" value="${cnt||1}" data-setup-count ${pool===0?'disabled':''}></label>
      <button class="btn big" data-start-quiz ${pool===0?'disabled':''} style="width:100%;justify-content:center;margin-top:6px">⚔️ Start de quest</button>
    </div>
    <p class="subj-meta" style="margin-top:14px;max-width:560px">Tip: goede antwoorden op rij geven een combo-bonus, en snel antwoorden levert extra XP op.</p>`;
}

function buildQuiz(){
  const {subjectId,topics,count}=state.setup;
  let pool=content.questions.filter(q=>q.subjectId===subjectId&&topics.includes(q.topic));
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  pool=pool.slice(0,Math.min(count,pool.length));
  const qs=pool.map(q=>{ if(q.type==='mc'){
      const opts=q.options.map((o,i)=>({o,correct:i===q.answer}));
      for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
      return {...q,_opts:opts,_answerIdx:opts.findIndex(x=>x.correct)};}
    return {...q}; });
  state.quiz={qs,idx:0,results:[],startedAt:Date.now(),qShownAt:Date.now(),sel:null,revealed:false,graded:false,typedDraft:'',
    subjectId,topics,xp:0,streak:0,maxStreak:0,lastFb:''};
}

function viewQuiz(){
  const q=state.quiz.qs[state.quiz.idx], n=state.quiz.qs.length, i=state.quiz.idx;
  let body='';
  if(q.type==='mc'){
    body=q._opts.map((o,k)=>{let cls='opt';
      if(state.quiz.revealed){ if(o.correct)cls+=' correct'; else if(state.quiz.sel===k)cls+=' wrong'; }
      else if(state.quiz.sel===k)cls+=' sel';
      const mk=state.quiz.revealed?(o.correct?'<span class="mark">✓</span>':(state.quiz.sel===k?'<span class="mark">✕</span>':'')):'';
      return `<button class="${cls}" data-pick="${k}" ${state.quiz.revealed?'disabled':''}>${esc(o.o)}${mk}</button>`;}).join('');
    if(state.quiz.revealed&&q.explanation) body+=`<div class="expl">${esc(q.explanation)}</div>`;
  }else{
    const draft=state.quiz.typedDraft||'';
    const isMap=q.type==='map';
    const cleanImg=isMap&&q.image?`<img src="${q.image}" alt="kaart" style="width:100%;max-width:420px;border-radius:10px;border:1px solid var(--line);display:block;margin:0 auto 14px"/>`:'';
    const labeledImg=isMap&&q.imageLabeled?`<img src="${q.imageLabeled}" alt="kaart met namen" style="width:100%;max-width:420px;border-radius:10px;border:1px solid var(--line);display:block;margin:0 auto 12px"/>`:'';
    const prompt=isMap?'Bekijk de kaart en typ welke plaats, rivier, regio, provincie of gebergte is aangegeven.':'Typ eerst je eigen antwoord — daarna kijk je het zelf na.';
    if(!state.quiz.revealed){
      body=`<div class="flash">${cleanImg}<div style="font-weight:500;color:var(--muted);font-size:13px;margin-bottom:8px">${prompt}</div>
        <textarea class="inp" id="typed" placeholder="Schrijf hier je antwoord…">${esc(draft)}</textarea></div>`;
    }else{
      body=`<div class="flash">${labeledImg?`<div style="font-weight:500;color:var(--muted);font-size:12.5px;margin-bottom:4px">Kaart met namen</div>${labeledImg}`:''}
        <div style="font-weight:500;color:var(--muted);font-size:12.5px;margin-bottom:4px">Jouw antwoord</div>
        <div style="font-size:15.5px;white-space:pre-wrap">${draft?esc(draft):'<span style="color:var(--muted)">(leeg gelaten)</span>'}</div>
        <div class="ans"><b>${isMap?'Juiste antwoord':'Modelantwoord'}:</b> ${esc(q.answer)}</div>${q.explanation?`<div class="expl">${esc(q.explanation)}</div>`:''}</div>`;
    }
  }
  let fb=state.quiz.revealed&&state.quiz.lastFb?`<div class="feedback ${state.quiz.lastFbOk?'ok':'no'}">${esc(state.quiz.lastFb)}</div>`:'<div class="feedback"></div>';
  let footer='';
  if(!state.quiz.revealed){
    footer=q.type==='mc'
      ?`<button class="btn" data-check ${state.quiz.sel===null?'disabled':''}>Controleer</button>`
      :`<button class="btn" id="revealBtn" data-reveal ${state.quiz.typedDraft.trim()?'':'disabled'}>Controleer mijn antwoord</button>`;
  }else if(q.type!=='mc'&&!state.quiz.graded){
    footer=`<div class="subj-meta" style="margin-bottom:8px">Had je het goed? Wees eerlijk — zo kloppen je voortgang en de data.</div>
      <div class="row" style="max-width:440px"><button class="btn btn-line" data-grade="0">Niet goed</button>
      <button class="btn" data-grade="1">Goed 💪</button></div>`;
  }else{
    footer=`<button class="btn" data-next>${i+1<n?'Volgende →':'Bekijk resultaat 🏆'}</button>`;
  }
  return `<div class="quiz-bar"><button class="ghost" data-abort>← Stoppen</button>
      <div class="quiz-stats"><span class="combo ${state.quiz.streak>=2?'show':''}" id="combo">🔥 ${state.quiz.streak}× combo</span>
        <span class="xpnow">${state.quiz.xp} XP</span><span class="timer" id="timer">0s</span></div></div>
    <div class="prog"><i style="width:${Math.round(i/n*100)}%"></i></div>
    <div class="subj-meta">Vraag ${i+1} van ${n} · ${esc(subjName(state.quiz.subjectId))}</div>
    <div class="q-topic">${esc(q.topic)}</div><div class="q-text">${esc(q.question)}</div>
    ${fb}${body}<div style="margin-top:14px">${footer}</div>`;
}

function gradeCurrent(correct){
  const qz=state.quiz, q=qz.qs[qz.idx];
  const secs=(Date.now()-qz.qShownAt)/1000;
  let gained=0, fast=false;
  if(correct){
    qz.streak++; qz.maxStreak=Math.max(qz.maxStreak,qz.streak);
    const streakBonus=Math.min(qz.streak-1,5)*3;
    fast=(q.type==='mc'&&secs<10);
    gained=10+streakBonus+(fast?5:0);
    qz.xp+=gained;
    qz.lastFb=(qz.streak>=3?`Goed! ${qz.streak}× op rij`:'Goed!')+` +${gained} XP`+(fast?' ⚡':'');
    qz.lastFbOk=true;
  }else{
    qz.streak=0; qz.lastFb='Helaas — bekijk de uitleg.'; qz.lastFbOk=false;
  }
  const given=q.type==='mc'?(qz.sel!=null&&q._opts[qz.sel]?q._opts[qz.sel].o:''):(qz.typedDraft||'');
  const correctAnswer=q.type==='mc'?(q._opts.find(o=>o.correct)||{}).o:q.answer;
  qz.results.push({questionId:q.id,topic:q.topic,type:q.type,question:q.question,given,correctAnswer,correct});
  qz.revealed=true; qz.graded=true;
  render();
  if(correct) showXpPop(gained);
}
function advance(){
  const qz=state.quiz;
  if(qz.idx+1<qz.qs.length){ qz.idx++; qz.sel=null; qz.revealed=false; qz.graded=false; qz.lastFb=''; qz.typedDraft=''; render(); }
  else finishQuiz();
}
async function finishQuiz(){
  stopTimer();
  const qz=state.quiz, dur=Math.round((Date.now()-qz.startedAt)/1000);
  const correct=qz.results.filter(r=>r.correct).length;
  let bonusXp=0; if(qz.results.length&&correct===qz.results.length) bonusXp=20; // perfecte sessie
  const before=levelInfo();
  const st=currentStudent();
  const attempt={id:uid(),studentId:st?st.id:'',student:st?st.name:'',level:st?st.level:'',
    subjectId:qz.subjectId,subjectName:subjName(qz.subjectId),topics:qz.topics,startedAt:qz.startedAt,finishedAt:Date.now(),
    durationSec:dur,total:qz.results.length,correct,results:qz.results,xp:qz.xp+bonusXp,maxStreak:qz.maxStreak,bonusXp};
  const oldBadges=badgeDefs().filter(b=>b.on).map(b=>b.id);
  attempts.push(attempt); await sset(KEYS.attempts,attempts);
  const after=levelInfo();
  const newBadges=badgeDefs().filter(b=>b.on&&!oldBadges.includes(b.id));
  state.lastAttempt=attempt; state.levelUp=after.lvl>before.lvl?after.lvl:0; state.newBadges=newBadges;
  state.view='results'; render();
  if((correct/attempt.total>=0.8)||state.levelUp) launchConfetti();
}

    <span class="tag">${q.type==='mc'?'meerkeuze':q.type==='map'?'kaart':'open'}</span><button class="lnk" data-del-q="${q.id}">verwijderen</button></div></div>`).join('')
    ||`<div class="subj-meta">Nog geen vragen.</div>`;

  return `<p class="h-eyebrow">Docent · beheer</p><h1 class="h1">Beheer</h1>
    <div class="grid" style="grid-template-columns:1fr;gap:16px;max-width:680px">

      <div class="card"><h2 class="mh">Leerlingen</h2>
        <p class="subj-meta" style="margin:0 0 12px">Leerlingen loggen in met hun naam én deze 4-cijferige code. Promoveer een leerling door het niveau te wijzigen — toetsen en resultaten blijven bewaard.</p>
        ${studentRows}
        <div style="margin-top:14px;border-top:1px solid var(--line);padding-top:14px">
          <div class="row" style="align-items:flex-end">
            <label class="fld" style="margin:0"><span>Naam</span><input class="inp" id="stName" placeholder="bijv. Sanne de Vries"></label>
            <label class="fld" style="margin:0;max-width:120px"><span>Code (4 cijfers)</span><input class="inp" id="stCode" placeholder="1234" maxlength="4" inputmode="numeric"></label>
            <label class="fld" style="margin:0"><span>Niveau / klas</span><select class="inp" id="stLevel">${levelOpts(levels[0])}</select></label>
          </div>
          <button class="btn" data-add-student style="margin-top:6px">Leerling toevoegen</button>
        </div></div>

      <div class="card"><h2 class="mh">Niveaus / klassen</h2>
        <div class="row"><input class="inp" id="newLevel" placeholder="bijv. Basisschool groep 5">
          <button class="btn" data-add-level style="flex:0">Toevoegen</button></div>
        <div class="checks" style="margin-top:14px">${levelChips}</div></div>

      <div class="card"><h2 class="mh">Vakken / toetsen</h2>
        <div class="row" style="align-items:flex-end">
          <label class="fld" style="margin:0"><span>Naam van het vak</span><input class="inp" id="newSubj" placeholder="bijv. Topografie Europa"></label>
          <label class="fld" style="margin:0"><span>Niveau</span><select class="inp" id="newSubjLevel">${levelOpts(levels[0])}</select></label>
          <button class="btn" data-add-subject style="flex:0">Toevoegen</button></div>
        <div class="checks" style="margin-top:14px">${subjChips}</div></div>

      <div class="card"><h2 class="mh">Nieuwe vraag</h2>
        <label class="fld"><span>Vak / toets</span><select class="inp" id="qSubj">${sOpts}</select></label>
        <label class="fld"><span>Onderwerp</span><input class="inp" id="qTopic" placeholder="bijv. §6.1 De Renaissance, of Provincies"></label>
        <label class="fld"><span>Type</span><select class="inp" id="qType">
          <option value="mc">Meerkeuze</option><option value="flash">Open vraag (zelf nakijken)</option>
          <option value="map">Kaart / topografie (2 afbeeldingen)</option></select></label>
        <label class="fld"><span>Vraag</span><textarea class="inp" id="qText" placeholder="Typ de vraag…"></textarea></label>
        <div id="mcFields"><label class="fld"><span>Antwoordopties (één per regel, juiste vooraan met *)</span>
          <textarea class="inp" id="qOpts" placeholder="*Wedergeboorte&#10;Verlichting&#10;Vooruitgang"></textarea></label></div>
        <div id="flashFields" style="display:none"><label class="fld"><span>Juiste antwoord</span><textarea class="inp" id="qAns" placeholder="Het juiste antwoord…"></textarea></label></div>
        <div id="mapFields" style="display:none">
          <label class="fld"><span>Juiste antwoord (plaats, rivier, provincie, gebergte…)</span><input class="inp" id="qMapAns" placeholder="bijv. Utrecht"></label>
          <div class="row">
            <label class="fld"><span>Kaart zónder namen</span><input class="inp" type="file" id="qImg" accept="image/*"></label>
            <label class="fld"><span>Kaart mét namen</span><input class="inp" type="file" id="qImgLabeled" accept="image/*"></label></div>
          <div id="imgPrev" class="subj-meta"></div>
        </div>
        <label class="fld"><span>Uitleg (optioneel)</span><input class="inp" id="qExpl" placeholder="Korte toelichting"></label>
        <button class="btn" data-add-question style="width:100%;justify-content:center">Vraag toevoegen</button></div>

      <div class="card"><h2 class="mh">Alle vragen (${content.questions.length})</h2>${qlist}</div>

      <div class="card"><h2 class="mh">Docentcode</h2>
        <p class="subj-meta" style="margin:0 0 12px">Met deze code kom je in dit beheerscherm. Houd hem geheim voor leerlingen.</p>
        <div class="row"><input class="inp" id="adminCode" value="${esc(content.adminCode||'')}" maxlength="8">
          <button class="btn" data-save-admincode style="flex:0">Opslaan</button></div></div>
    </div>`;
}

/* ===================== Data modal ===================== */
function openDataModal(){
  const payload=JSON.stringify({content,attempts},null,2);
  const studs=(content.students||[]).map(s=>s.name);
  document.getElementById('modal').innerHTML=`<div class="modal-bg" id="modalBg"><div class="modal pos">
    <button class="x" data-close-modal>×</button><div class="modal-in"><h3>Data &amp; export</h3>
    <p class="subj-meta" style="margin:0 0 16px">${attempts.length} sessies · ${(content.students||[]).length} leerling${(content.students||[]).length===1?'':'en'}${studs.length?` (${studs.map(esc).join(', ')})`:''}. Opslag: ${esc(storageLabel())}. Elke sessie bevat de leerling, het niveau, de gegeven antwoorden (ook getypte) en de tijd, voor verwerking per leerling.</p>
    <textarea class="inp" id="exportBox" style="min-height:160px;font-family:var(--mono);font-size:12px">${esc(payload)}</textarea>
    <div class="row" style="margin-top:12px"><button class="btn" data-copy>Kopieer JSON</button>
      <button class="btn btn-line" data-import>Importeer geplakte JSON</button></div>
    <div style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px"><button class="lnk" data-reset-attempts>Wis alle sessieresultaten (XP &amp; badges)</button></div>
    </div></div></div>`;
}
function closeModal(){document.getElementById('modal').innerHTML='';}
function openAdminPrompt(){
  document.getElementById('modal').innerHTML=`<div class="modal-bg" id="modalBg"><div class="modal pos" style="max-width:380px">
    <button class="x" data-close-modal>×</button><div class="modal-in"><h3>Docent / beheer</h3>
    <p class="subj-meta" style="margin:0 0 14px">Voer de docentcode in om leerlingen, niveaus en toetsen te beheren.</p>
    <input class="inp" id="adminPrompt" inputmode="numeric" placeholder="docentcode" maxlength="8" autocomplete="off">
    <div class="feedback no" id="adminErr" style="min-height:0"></div>
    <button class="btn" data-action="admin-go" style="width:100%;justify-content:center;margin-top:10px">Inloggen als docent</button>
    </div></div></div>`;
  setTimeout(()=>{const el=document.getElementById('adminPrompt'); if(el) el.focus();},30);
}

/* ===================== Animaties ===================== */
function drawRing(){
  const el=document.getElementById('ringfg'); if(!el||!state.lastAttempt) return;
  const pct=state.lastAttempt.correct/state.lastAttempt.total;
  const C=2*Math.PI*64;
  requestAnimationFrame(()=>{ el.style.transition='stroke-dashoffset 1.1s cubic-bezier(.2,.8,.3,1)';
    el.style.strokeDasharray=C; el.style.strokeDashoffset=C*(1-pct); });
}
function showXpPop(amount){
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const btn=document.querySelector('.opt.correct')||document.querySelector('[data-grade]')||document.querySelector('.q-text');
  if(!btn) return; const r=btn.getBoundingClientRect();
  const el=document.createElement('div'); el.className='xppop'; el.textContent='+'+amount+' XP';
  el.style.left=(r.left+r.width/2-20)+'px'; el.style.top=(r.top-6)+'px';
  el.style.animation='float-up 1.1s ease-out forwards'; document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}
function launchConfetti(){
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const cv=document.getElementById('confetti'), ctx=cv.getContext('2d');
  cv.width=innerWidth; cv.height=innerHeight;
  const cols=['#6C7BFF','#9B6CFF','#FFC24B','#4BE0A8','#FF6B6B'];
  const P=Array.from({length:140},()=>({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*.3,
    r:5+Math.random()*6,c:cols[(Math.random()*cols.length)|0],vy:2+Math.random()*3,vx:-1.5+Math.random()*3,
    rot:Math.random()*6.28,vr:-.2+Math.random()*.4}));
  let t=0;
  (function loop(){ t++; ctx.clearRect(0,0,cv.width,cv.height);
    P.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.04; p.rot+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6); ctx.restore(); });
    if(t<170) requestAnimationFrame(loop); else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

/* ===================== Timer ===================== */
function startTimerDisplay(){ stopTimer(); timerInt=setInterval(()=>{const el=document.getElementById('timer');
  if(!el||!state.quiz){stopTimer();return;} el.textContent=fmtDur(Math.round((Date.now()-state.quiz.startedAt)/1000));},1000); }
function stopTimer(){ if(timerInt){clearInterval(timerInt);timerInt=null;} }

/* ===================== Events ===================== */
const ACTION_ATTRS=['data-nav','data-action','data-login','data-start-subject','data-start-topic','data-toggle-topic','data-start-quiz','data-pick','data-check','data-reveal','data-grade','data-next','data-abort','data-report-student','data-report-back','data-add-level','data-del-level','data-add-student','data-edit-student','data-save-student','data-cancel-edit','data-del-student','data-save-admincode','data-add-subject','data-del-subject','data-add-question','data-del-q','data-close-modal','data-copy','data-import','data-reset-attempts'];
function findAction(start){ let el=start;
  while(el&&el.nodeType===1){ for(const a of ACTION_ATTRS){ if(el.hasAttribute(a)) return el; } el=el.parentElement; }
  return null; }
document.addEventListener('click',async(e)=>{
  if(e.target&&e.target.id==='modalBg'){ closeModal(); return; }
  const t=findAction(e.target);
  if(!t) return;
  if(t.dataset.nav){ stopTimer(); state.reportStudent=null; state.view=t.dataset.nav; render(); return; }
  if(t.dataset.reportStudent){ state.reportStudent=t.dataset.reportStudent; render(); return; }
  if(t.hasAttribute('data-report-back')){ state.reportStudent=null; render(); return; }
  if(t.dataset.action==='open-data'){ openDataModal(); return; }
  if(t.dataset.action==='logout'){ await logout(); render(); return; }
  if(t.dataset.action==='teacher'){ openAdminPrompt(); return; }
  if(t.dataset.action==='admin-go'){ const v=(document.getElementById('adminPrompt').value||'').trim();
    if(v!==String(content.adminCode)){ const er=document.getElementById('adminErr'); if(er)er.textContent='Onjuiste docentcode.'; return; }
    state.mode='admin'; state.view='manage'; closeModal(); render(); return; }
  if(t.hasAttribute('data-login')){
    const nm=(document.getElementById('loginName').value||'').trim();
    const code=(document.getElementById('loginCode').value||'').trim();
    const err=document.getElementById('loginErr');
    const st=(content.students||[]).find(s=>s.name.toLowerCase()===nm.toLowerCase()&&String(s.code)===code);
    if(!st){ if(err) err.textContent='Naam en code kloppen niet. Vraag je docent om de juiste gegevens.'; return; }
    await loginStudent(st.id); state.view='dashboard'; render(); return; }
  if(t.hasAttribute('data-close-modal')){ closeModal(); return; }
  if(t.dataset.startSubject){ state.setup={subjectId:t.dataset.startSubject,topics:null,count:10}; state.view='setup'; render(); return; }
  if(t.dataset.startTopic){ const[sid,tp]=t.dataset.startTopic.split('|'); state.setup={subjectId:sid,topics:[tp],count:10}; state.view='setup'; render(); return; }
  if(t.dataset.toggleTopic!==undefined){ const tp=t.dataset.toggleTopic,arr=state.setup.topics,i=arr.indexOf(tp);
    if(i>=0){if(arr.length>1)arr.splice(i,1);}else arr.push(tp); render(); return; }
  if(t.hasAttribute('data-start-quiz')){ buildQuiz(); state.view='quiz'; render(); return; }
  if(t.dataset.pick!==undefined){ state.quiz.sel=parseInt(t.dataset.pick); render(); return; }
  if(t.hasAttribute('data-check')){ const q=state.quiz.qs[state.quiz.idx]; gradeCurrent(state.quiz.sel===q._answerIdx); return; }
  if(t.hasAttribute('data-reveal')){ const ta=document.getElementById('typed'); const v=ta?ta.value.trim():'';
    if(!v){ if(ta){ta.focus();} return; } state.quiz.typedDraft=ta.value; state.quiz.revealed=true; render(); return; }
  if(t.dataset.grade!==undefined){ gradeCurrent(t.dataset.grade==='1'); return; }
  if(t.hasAttribute('data-next')){ advance(); return; }
  if(t.hasAttribute('data-abort')){ stopTimer(); state.quiz=null; state.view='dashboard'; render(); return; }
  // ---- Leerlingbeheer ----
  if(t.hasAttribute('data-add-level')){ const v=document.getElementById('newLevel').value.trim(); if(!v)return;
    if(!content.levels.includes(v)) content.levels.push(v); await sset(KEYS.content,content); render(); return; }
  if(t.dataset.delLevel!==undefined){ const v=t.dataset.delLevel;
    if(content.subjects.some(s=>s.level===v)||content.students.some(s=>s.level===v)){ alert('Dit niveau is nog in gebruik door een vak of leerling.'); return; }
    content.levels=content.levels.filter(l=>l!==v); await sset(KEYS.content,content); render(); return; }
  if(t.hasAttribute('data-add-student')){
    const name=document.getElementById('stName').value.trim(), code=document.getElementById('stCode').value.trim(), level=document.getElementById('stLevel').value;
    if(!name){alert('Vul een naam in.');return;}
    if(!/^\d{4}$/.test(code)){alert('De code moet precies 4 cijfers zijn.');return;}
    if(content.students.some(s=>s.name.toLowerCase()===name.toLowerCase()&&String(s.code)===code)){alert('Deze combinatie van naam en code bestaat al.');return;}
    content.students.push({id:uid(),name,code,level,createdAt:Date.now()});
    await sset(KEYS.content,content); render(); return; }
  if(t.dataset.editStudent){ state.editStudent=content.students.find(s=>s.id===t.dataset.editStudent); render(); return; }
  if(t.hasAttribute('data-cancel-edit')){ state.editStudent=null; render(); return; }
  if(t.dataset.saveStudent){ const id=t.dataset.saveStudent, st=content.students.find(s=>s.id===id);
    const name=document.getElementById('edName').value.trim(), code=document.getElementById('edCode').value.trim(), level=document.getElementById('edLevel').value;
    if(!name){alert('Vul een naam in.');return;} if(!/^\d{4}$/.test(code)){alert('De code moet precies 4 cijfers zijn.');return;}
    st.name=name; st.code=code; st.level=level; state.editStudent=null;
    await sset(KEYS.content,content); render(); return; }
  if(t.dataset.delStudent){ if(!confirm('Leerling verwijderen? De eerder gemaakte sessies blijven bewaard in de data (voor verwerking), maar de leerling kan niet meer inloggen.'))return;
    content.students=content.students.filter(s=>s.id!==t.dataset.delStudent); await sset(KEYS.content,content); render(); return; }
  if(t.hasAttribute('data-save-admincode')){ const v=document.getElementById('adminCode').value.trim(); if(!v){alert('Vul een code in.');return;}
    content.adminCode=v; await sset(KEYS.content,content); alert('Docentcode opgeslagen.'); return; }
  if(t.hasAttribute('data-add-subject')){ const v=document.getElementById('newSubj').value.trim();
    const level=document.getElementById('newSubjLevel').value; if(!v)return;
    content.subjects.push({id:uid(),name:v,level}); await sset(KEYS.content,content); render(); return; }
  if(t.dataset.delSubject){ if(!confirm('Vak en bijbehorende vragen verwijderen?'))return; const id=t.dataset.delSubject;
    content.subjects=content.subjects.filter(s=>s.id!==id); content.questions=content.questions.filter(q=>q.subjectId!==id);
    await sset(KEYS.content,content); render(); return; }
  if(t.hasAttribute('data-add-question')){
    const subjectId=document.getElementById('qSubj').value, topic=document.getElementById('qTopic').value.trim(),
      type=document.getElementById('qType').value, question=document.getElementById('qText').value.trim(),
      explanation=document.getElementById('qExpl').value.trim();
    if(!topic||!question){alert('Vul onderwerp en vraag in.');return;}
    const nq={id:uid(),subjectId,topic,type,question}; if(explanation)nq.explanation=explanation;
    if(type==='mc'){ const lines=document.getElementById('qOpts').value.split('\n').map(l=>l.trim()).filter(Boolean);
      if(lines.length<2){alert('Geef minstens 2 antwoordopties.');return;}
      const ans=lines.findIndex(l=>l.startsWith('*')); if(ans<0){alert('Markeer het juiste antwoord met een * ervoor.');return;}
      nq.options=lines.map(l=>l.replace(/^\*/,'').trim()); nq.answer=ans;
    }else if(type==='map'){ const a=document.getElementById('qMapAns').value.trim();
      if(!a){alert('Vul het juiste antwoord in.');return;}
      if(!state.pendingImg){alert('Upload de kaart zónder namen.');return;}
      nq.answer=a; nq.image=state.pendingImg; if(state.pendingImgLabeled) nq.imageLabeled=state.pendingImgLabeled;
    }else{ const a=document.getElementById('qAns').value.trim(); if(!a){alert('Vul het antwoord in.');return;} nq.answer=a; }
    content.questions.push(nq); state.pendingImg=null; state.pendingImgLabeled=null; await sset(KEYS.content,content); render(); return; }
  if(t.dataset.delQ){ content.questions=content.questions.filter(q=>q.id!==t.dataset.delQ); await sset(KEYS.content,content); render(); return; }
  if(t.hasAttribute('data-copy')){ const box=document.getElementById('exportBox');
    try{ await navigator.clipboard.writeText(box.value); t.textContent='Gekopieerd ✓'; setTimeout(()=>t.textContent='Kopieer JSON',1500); }
    catch(err){ box.select(); try{document.execCommand('copy');}catch(_){} t.textContent='Gekopieerd ✓'; setTimeout(()=>t.textContent='Kopieer JSON',1500); } return; }
  if(t.hasAttribute('data-import')){ try{ const d=JSON.parse(document.getElementById('exportBox').value);
      if(d.content&&d.content.subjects){content=migrate(d.content); await sset(KEYS.content,content);}
      if(Array.isArray(d.attempts)){attempts=d.attempts; await sset(KEYS.attempts,attempts);}
      closeModal(); state.view=state.mode==='admin'?'manage':'dashboard'; render();
    }catch(err){ alert('Kon de JSON niet lezen. Controleer of je geldige geëxporteerde data hebt geplakt.'); } return; }
  if(t.hasAttribute('data-reset-attempts')){ if(!confirm('Alle sessieresultaten, XP en badges wissen? Vakken, leerlingen en vragen blijven behouden.'))return;
    attempts=[]; await sset(KEYS.attempts,attempts); closeModal(); render(); return; }
});
document.addEventListener('change',async(e)=>{
  if(e.target.matches('[data-setup-subject]')){ state.setup.subjectId=e.target.value; state.setup.topics=null; render(); }
  if(e.target.matches('[data-setup-count]')){ state.setup.count=parseInt(e.target.value); const c=document.getElementById('cnt'); if(c)c.textContent=e.target.value; }
  if(e.target.id==='qType'){ const v=e.target.value;
    const set=(id,on)=>{const el=document.getElementById(id); if(el)el.style.display=on?'block':'none';};
    set('mcFields',v==='mc'); set('flashFields',v==='flash'); set('mapFields',v==='map'); }
  if(e.target.id==='qImg'||e.target.id==='qImgLabeled'){
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    const prev=document.getElementById('imgPrev');
    try{ const data=await scaleImage(f,1100,0.72);
      if(e.target.id==='qImg') state.pendingImg=data; else state.pendingImgLabeled=data;
      if(prev) prev.textContent=`${state.pendingImg?'kaart zonder namen ✓':''} ${state.pendingImgLabeled?'· kaart met namen ✓':''}`.trim();
    }catch(err){ if(prev) prev.textContent='Kon de afbeelding niet verwerken.'; }
  }
});
document.addEventListener('input',(e)=>{
  if(e.target.matches('[data-setup-count]')){const c=document.getElementById('cnt');if(c)c.textContent=e.target.value;}
  if(e.target.id==='typed'&&state.quiz){ state.quiz.typedDraft=e.target.value; const b=document.getElementById('revealBtn');
    if(b){ if(e.target.value.trim())b.removeAttribute('disabled'); else b.setAttribute('disabled',''); } }
});
document.addEventListener('keydown',(e)=>{
  if(e.key!=='Enter') return;
  if(e.target.id==='loginName'||e.target.id==='loginCode'){ e.preventDefault(); const b=document.querySelector('[data-login]'); if(b) b.click(); }
  if(e.target.id==='adminPrompt'){ e.preventDefault(); const b=document.querySelector('[data-action="admin-go"]'); if(b) b.click(); }
  if(e.target.id==='newLevel'){ e.preventDefault(); const b=document.querySelector('[data-add-level]'); if(b) b.click(); }
  if(e.target.id==='newSubj'){ e.preventDefault(); const b=document.querySelector('[data-add-subject]'); if(b) b.click(); }
});
window.addEventListener('resize',()=>{const cv=document.getElementById('confetti');if(cv){cv.width=innerWidth;cv.height=innerHeight;}});

init();
</script>
